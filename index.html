<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Collage</title>
<style>
body{background:#050505;color:#fff;font-family:Arial;padding:20px}
.container{max-width:900px;margin:auto;background:#111;padding:25px;border-radius:20px}
input,button{width:100%;padding:12px;margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
canvas{max-width:100%;border:2px solid yellow}
</style>
</head>
<body>
<div class="container">
<h2>AUTO COLLAGE</h2>

<input id="title" placeholder="Judul">
<input id="subtitle" placeholder="Satuan">
<input id="date" placeholder="Tanggal">

<div class="grid">
<input type="file" id="img1" accept="image/*">
<input type="file" id="img2" accept="image/*">
<input type="file" id="img3" accept="image/*">
<input type="file" id="img4" accept="image/*">
</div>

<button onclick="generate()">BUAT KOLASE</button>
<br><br>
<canvas id="canvas" width="1920" height="1080"></canvas>
<br><br>
<a id="download" download="collage.jpg">DOWNLOAD JPG</a>
</div>

<script>
async function loadImage(src){
 return new Promise((res)=>{
   const img=new Image();
   img.onload=()=>res(img);
   img.src=src;
 });
}

async function fileToImage(file){
 return new Promise((res)=>{
   const r=new FileReader();
   r.onload=e=>{
     const img=new Image();
     img.onload=()=>res(img);
     img.src=e.target.result;
   };
   r.readAsDataURL(file);
 });
}

async function generate(){
 const c=document.getElementById("canvas");
 const ctx=c.getContext("2d");

 const bg=await loadImage("background.jpeg");
 ctx.drawImage(bg,0,0,1920,1080);

 ctx.fillStyle="yellow";
 ctx.textAlign="center";

 ctx.font="bold 46px Arial";
 ctx.strokeStyle="black";
 ctx.lineWidth=8;

 let t=document.getElementById("title").value.toUpperCase();
 ctx.strokeText(t,960,60);
 ctx.fillText(t,960,60);

 let s=document.getElementById("subtitle").value.toUpperCase();
 ctx.strokeText(s,960,115);
 ctx.fillText(s,960,115);

 ctx.font="30px Arial";
 let d=document.getElementById("date").value.toUpperCase();
 ctx.fillText(d,960,165);

 const pos=[
  [230,210],[970,210],
  [230,620],[970,620]
 ];

 for(let i=1;i<=4;i++){
   let f=document.getElementById("img"+i).files[0];
   if(!f) continue;

   let img=await fileToImage(f);

   ctx.fillStyle="yellow";
   ctx.fillRect(pos[i-1][0],pos[i-1][1],726,396);

   ctx.drawImage(
      img,
      pos[i-1][0]+3,
      pos[i-1][1]+3,
      720,
      390
   );
 }

 document.getElementById("download").href=c.toDataURL("image/jpeg",0.95);
}
</script>
</body>
</html>
